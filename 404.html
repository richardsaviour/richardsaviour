<script src="https://unpkg.com/@lottiefiles/dotlottie-wc@0.9.14/dist/dotlottie-wc.js" type="module"></script>

<style>
  /* 404-specific layout — keeps everything in inline file so styles.css stays untouched */
  .err-hero {
    min-height: 88vh;
    background: var(--off-white);
    display: flex;
    align-items: center;
    padding: 140px 0 80px;
  }
  .err-grid {
    display: grid;
    grid-template-columns: 1.05fr 0.95fr;
    gap: 56px;
    align-items: center;
  }
  .err-art {
    display: flex;
    justify-content: center;
    align-items: center;
    order: 2; /* art on the right on desktop */
  }
  .err-art dotlottie-wc {
    width: 100%;
    max-width: 460px;
    height: auto;
    aspect-ratio: 1 / 1;
  }
  .err-copy { order: 1; }
  .err-meta {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    font-family: var(--font-mono, 'JetBrains Mono', monospace);
    font-size: 12px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-mute);
    margin-top: 28px;
  }
  .err-meta .pulse {
    width: 8px; height: 8px; border-radius: 999px;
    background: #d33; display: inline-block;
    box-shadow: 0 0 0 0 rgba(221, 51, 51, 0.55);
    animation: err-pulse 1.8s ease-out infinite;
  }
  @keyframes err-pulse {
    0%   { box-shadow: 0 0 0 0 rgba(221, 51, 51, 0.55); }
    70%  { box-shadow: 0 0 0 14px rgba(221, 51, 51, 0); }
    100% { box-shadow: 0 0 0 0 rgba(221, 51, 51, 0); }
  }

  @media (max-width: 860px) {
    .err-hero { padding: 120px 0 60px; min-height: auto; }
    .err-grid { grid-template-columns: 1fr; gap: 24px; text-align: left; }
    .err-art { order: 1; }     /* animation appears ABOVE text on mobile */
    .err-copy { order: 2; }
    .err-art dotlottie-wc { max-width: 300px; }
  }
</style>
</head>
<body>

<section class="err-hero">

      <div class="err-copy">
        <span class="eyebrow">Error 404 · page not found</span>
        <h1>
          That page <span class="accent">doesn't exist.</span>
        </h1>
        <p class="lead">
          Maybe a typo. Maybe an old link. Either way, the rest of the site is right here.
          <em style="font-family: var(--font-display); font-weight: 500;">...</em>
        </p>
        <div class="hero-ctas" style="margin-top: 32px;">
          <a href="/" class="btn btn-primary">
            Back to home
            <svg class="arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M7 17L17 7M9 7h8v8"/></svg>
          </a>
          <a href="/contact/" class="btn btn-ghost">Or talk to me</a>
        </div>
      <div class="err-art" aria-hidden="true">
        <dotlottie-wc
          src="https://lottie.host/728c1fe9-38d6-4914-ad30-f51c37ad64eb/DjHUySkzkE.lottie"
          autoplay
          loop>
        </dotlottie-wc>
      </div>

    </div>
  </div>
</section>
